<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrarse</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="bg-page">

  <!-- BARRA SUPERIOR -->
  <header class="bg-mep text-white py-2 shadow-sm">
    <div class="container d-flex align-items-center gap-3">
      <img th:src="@{/img/mep-logo.png}" alt="Logo MEP" height="36" class="logo-mep"/>
      <h1 class="h6 m-0 fw-semibold">Registro de usuario · MEP</h1>
    </div>
  </header>

  <!-- SUBNAV -->
  <nav class="bg-mep-700 text-white">
    <div class="container d-flex gap-4 py-2 small">
      <a class="nav-link-lite" th:href="@{/faq}">Preguntas Frecuentes</a>
      <a class="nav-link-lite" th:href="@{/ayuda}">Ayuda</a>
      <a class="nav-link-lite" th:href="@{/contacto}">Contáctanos</a>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="container py-5">
    <div class="register-card shadow-sm rounded-3 p-4 p-lg-5">

      <div class="container">

        <h1 class="h4 mb-4">Registro de usuario</h1>

        <!-- Mensaje de error de negocio (correo/doc ya registrado o genérico) -->
        <div th:if="${errorRegistro}" class="alert alert-danger py-2" role="alert">
          <span th:text="${errorRegistro}">Ha ocurrido un error en el registro.</span>
        </div>

        <form th:action="@{/register}" th:object="${usuario}" method="post" novalidate>

          <!-- Token CSRF -->
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <!-- Tipo de documento -->
          <div class="mb-3">
            <label for="tipoDocumento" class="form-label">Tipo de Documento</label>
            <select id="tipoDocumento"
                    th:field="*{tipoDocumento}"
                    class="form-select"
                    required>
              <option value="" disabled>Seleccione</option>
              <option value="Cédula de Ciudadanía">Cédula de Ciudadanía</option>
              <option value="Tarjeta de Identidad">Tarjeta de Identidad</option>
              <option value="Cédula de Extranjería">Cédula de Extranjería</option>
              <option value="Pasaporte">Pasaporte</option>
            </select>
          </div>

          <!-- Número de documento -->
          <div class="mb-3">
            <label for="numeroDocumento" class="form-label">Número de Documento</label>
            <input type="text"
                   id="numeroDocumento"
                   th:field="*{numeroDocumento}"
                   class="form-control"
                   required>
          </div>

          <!-- Nombre -->
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text"
                   id="nombre"
                   th:field="*{nombre}"
                   class="form-control"
                   required>
          </div>

          <!-- Apellido -->
          <div class="mb-3">
            <label for="apellido" class="form-label">Apellido</label>
            <input type="text"
                   id="apellido"
                   th:field="*{apellido}"
                   class="form-control"
                   required>
          </div>

          <!-- Teléfono -->
          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="text"
                   id="telefono"
                   th:field="*{telefono}"
                   class="form-control"
                   required>
          </div>

          <!-- Correo -->
          <div class="mb-3">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email"
                   id="correo"
                   th:field="*{correo}"
                   class="form-control"
                   required>
          </div>

          <!-- Contraseña -->
          <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password"
                   id="password"
                   th:field="*{password}"
                   class="form-control"
                   required>
            <div class="form-text small">
              Mínimo 8 caracteres. Usa mayúsculas, minúsculas, números y caracteres especiales.
            </div>
          </div>

          <!-- Botón -->
          <div class="d-grid mb-2">
            <button type="submit" class="btn btn-mep">
              Registrar
            </button>
          </div>

        </form>

        <p class="mt-3 mb-0 small">
          ¿Ya tienes una cuenta?
          <a th:href="@{/login}" class="link-mep">Inicia sesión aquí</a>
        </p>
      </div>

    </div>
  </main>

  <!-- BARRA INFERIOR -->
  <footer class="footer-mep">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3 py-3">
      <span class="small text-white-50">
        © <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span> MEP
      </span>
      <nav class="d-flex gap-3 small">
        <a class="nav-link-lite" th:href="@{/terminos}">Términos</a>
        <a class="nav-link-lite" th:href="@{/privacidad}">Privacidad</a>
        <a class="nav-link-lite" th:href="@{/soporte}">Soporte</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
