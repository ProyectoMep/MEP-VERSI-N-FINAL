<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="bg-page">

<!-- HEADER -->
<header class="bg-mep text-white py-2 shadow-sm">
    <div class="container d-flex align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
            <img th:src="@{/img/mep-logo.png}" alt="MEP" height="36" />
            <h1 class="h6 m-0 fw-semibold">MEP - Administración</h1>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-light btn-sm">Volver</a>
    </div>
</header>

<!-- Subnav -->
<nav class="bg-mep-700 text-white">
    <div class="container d-flex gap-4 py-2 small">
        <a class="nav-link-lite" th:href="@{/faq}">Preguntas Frecuentes</a>
        <a class="nav-link-lite" th:href="@{/ayuda}">Ayuda</a>
        <a class="nav-link-lite" th:href="@{/contacto}">Contáctanos</a>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="container my-4">
    <div class="shadow-sm rounded-3 p-4 p-lg-5 mx-auto" style="max-width: 720px; background-color: #fff;">
        <h2 class="h5 text-center mb-4">Crear Nuevo Usuario</h2>

        <!-- Mensaje de error si existe -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- FORMULARIO -->
        <form th:action="@{/admin/usuarios/nuevo}" method="post">

            <!-- CSRF -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- NOMBRE -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>

            <!-- APELLIDO -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" class="form-control" required>
            </div>

            <!-- CORREO -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" class="form-control" required>
            </div>

            <!-- TELÉFONO -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" class="form-control" required>
            </div>

            <!-- CONTRASEÑA -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <!-- ROL -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="rolId">Rol del usuario</label>
                <select id="rolId" name="rolId" class="form-select" required>
                    <option value="" disabled selected>Seleccione</option>
                    <option th:each="r : ${roles}"
                            th:value="${r.id}"
                            th:text="${r.nombre}"></option>
                </select>
            </div>

            <!-- ASOCIAR COLEGIO SOLO SI ES GESTOR -->
            <div class="mb-3">
                <label class="form-label fw-semibold" for="institucionId">Institución (solo para Gestor)</label>
                <select id="institucionId" name="institucionId" class="form-select">
                    <option value="" selected>Seleccione</option>
                    <option th:each="inst : ${instituciones}"
                            th:value="${inst.id}"
                            th:text="${inst.nombre}"></option>
                </select>
            </div>

            <!-- BOTONES -->
            <div class="row g-2 mt-4">
                <div class="col-12 col-md-6">
                    <button type="submit" class="btn btn-success w-100">Crear Usuario</button>
                </div>
                <div class="col-12 col-md-6">
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary w-100">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
