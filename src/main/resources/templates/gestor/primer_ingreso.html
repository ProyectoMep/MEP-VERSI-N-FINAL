<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Completar Información - Gestor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-page">

<header class="bg-mep text-white py-2 shadow-sm">
    <div class="container">
        <h4 class="m-0">Completar Información de Institución</h4>
    </div>
</header>

<main class="container my-4">

    <div class="card p-4 shadow-sm">
        <h5 class="mb-3">Información obligatoria</h5>

        <form th:action="@{/gestor/primer-ingreso}" method="post">

            <!-- MISIÓN -->
            <div class="mb-3">
                <label class="fw-semibold">Misión</label>
                <textarea class="form-control" name="mision" rows="3" required></textarea>
            </div>

            <!-- VISIÓN -->
            <div class="mb-3">
                <label class="fw-semibold">Visión</label>
                <textarea class="form-control" name="vision" rows="3" required></textarea>
            </div>

            <!-- LOCALIDAD -->
            <div class="mb-3">
                <label class="fw-semibold">Localidad</label>
                <input type="text" class="form-control" name="localidad"
                       th:value="${institucion.localidad}" required>
            </div>

            <!-- DIRECCIÓN -->
            <div class="mb-3">
                <label class="fw-semibold">Dirección</label>
                <input type="text" class="form-control" name="direccionPrincipal"
                       th:value="${institucion.direccionPrincipal}" required>
            </div>

            <!-- GRADOS OFRECIDOS -->
            <div class="mb-3">
                <label class="fw-semibold">Grados académicos ofrecidos</label>
                <select name="gradosAcademicos" class="form-select" required>
                    <option value="1-5">Primero a Quinto</option>
                    <option value="1-11">Primero a Once</option>
                </select>
            </div>

            <!-- JORNADAS -->
            <div class="mb-3">
                <label class="fw-semibold">Jornadas</label>
                <select name="jornadas" class="form-select" required>
                    <option value="Diurna">Diurna</option>
                    <option value="Nocturna">Nocturna</option>
                    <option value="Jornada Completa">Jornada Completa</option>
                    <option value="Sabatina">Sabatina</option>
                </select>
            </div>

            <!-- CUPOS POR GRADO -->
            <div class="mb-3">
                <label class="fw-semibold">Cupos por grado (ej: 1=30;2=25;3=40)</label>
                <input type="text" name="cuposPorGrado" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Guardar y continuar</button>
        </form>
    </div>

</main>

</body>
</html>
