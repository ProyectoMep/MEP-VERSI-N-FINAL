<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel del Gestor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Tu CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body class="bg-page">

<!-- BARRA SUPERIOR -->
<header class="bg-mep text-white py-2 shadow-sm">
    <div class="container d-flex align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
            <img th:src="@{/img/mep-logo.png}" alt="MEP" height="36" />
            <h1 class="h6 m-0 fw-semibold">Gestión Institucional - MEP</h1>
        </div>
        <a th:href="@{/logout}" class="btn btn-light btn-sm fw-semibold">Cerrar sesión</a>
    </div>
</header>

<!-- SUBNAV -->
<nav class="bg-mep-700 text-white">
    <div class="container d-flex gap-4 py-2 small">
        <a class="nav-link-lite" th:href="@{/faq}">Preguntas Frecuentes</a>
        <a class="nav-link-lite" th:href="@{/ayuda}">Ayuda</a>
        <a class="nav-link-lite" th:href="@{/contacto}">Contáctanos</a>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="container my-5">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body p-4 p-lg-5">

            <h2 class="h5 text-center mb-4">Panel del Gestor</h2>
            <p class="text-center text-muted mb-4">
                Selecciona una de las opciones para gestionar tu institución.
            </p>

            <div class="row g-3">

                <!-- estudiantes -->
                <div class="col-12 col-md-4">
                    <a class="btn btn-outline-mep w-100 py-3"
                       th:href="@{/gestor/estudiantes}">
                        📘 Estudiantes
                    </a>
                </div>

                <!-- Citas programadas -->
                <div class="col-12 col-md-4">
                    <a class="btn btn-outline-mep w-100 py-3"
                       th:href="@{/gestor/citas}">
                        📅 Citas programadas
                    </a>
                </div>

                <!-- Editar información -->
                <div class="col-12 col-md-4">
                    <a class="btn btn-outline-mep w-100 py-3"
                       th:href="@{/gestor/editar-institucion}">
                        🛠️ Editar información
                    </a>
                </div>

            </div>

        </div>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
