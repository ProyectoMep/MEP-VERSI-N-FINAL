<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thyme.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Encuentra tu Colegio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Estilos globales -->
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="bg-page">

<!-- BARRA SUPERIOR -->
<header class="bg-mep text-white py-2 shadow-sm">
    <div class="container d-flex align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
            <img th:src="@{/img/mep-logo.png}" alt="MEP" height="36" />
            <h1 class="h6 m-0 fw-semibold">Matrículas y Educación Pública</h1>
        </div>

        <a th:href="@{/tutor/dashboard}" class="btn btn-warning btn-sm fw-semibold">
            Volver al inicio
        </a>
    </div>
</header>

<!-- CONTENIDO -->
<main class="container my-5">
    <div class="card shadow-sm mx-auto" style="max-width: 900px;">
        <div class="card-body p-4 p-lg-5">

            <h2 class="h5 mb-4 text-center">🔎 Encuentra tu Colegio</h2>
            <p class="text-muted mb-4 text-center">
                Selecciona una localidad para ver los colegios registrados en el sistema.
            </p>

            <!-- FORMULARIO DE FILTRO -->
            <form th:action="@{/tutor/encuentra-colegio}" method="get" class="row g-3 align-items-end mb-4">

                <div class="col-12 col-md-8">
                    <label for="localidad" class="form-label fw-semibold">Localidad</label>
                    <select id="localidad" name="localidad" class="form-select" required>

                        <option value="" disabled 
                                th:selected="${localidadSeleccionada == null}">
                            -- Selecciona una localidad --
                        </option>

                        <option th:each="loc : ${localidades}"
                                th:value="${loc}"
                                th:text="${loc}"
                                th:selected="${loc == localidadSeleccionada}">
                        </option>
                    </select>
                </div>

                <div class="col-12 col-md-4">
                    <button type="submit" class="btn btn-mep w-100 mt-3 mt-md-0">
                        Buscar colegios
                    </button>
                </div>

            </form>

            <!-- RESULTADOS -->
            <div th:if="${colegios != null and !colegios.isEmpty()}">

                <h3 class="h6 mb-3">
                    Resultados para: 
                    <span class="fw-bold" th:text="${localidadSeleccionada}"></span>
                </h3>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Dirección</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="col : ${colegios}">
                            <td th:text="${col.nombre}">Nombre colegio</td>
                            <td th:text="${col.direccionPrincipal}">Dirección</td>
                            <td th:text="${col.telefono != null ? col.telefono : 'No registra'}"></td>

                            <td>
                                <a th:if="${col.correo != null}"
                                   th:href="'mailto:' + ${col.correo}"
                                   th:text="${col.correo}">
                                </a>
                                <span th:if="${col.correo == null}">No registra</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- SIN RESULTADOS -->
            <div th:if="${colegios != null and colegios.isEmpty() and localidadSeleccionada != null}">
                <div class="alert alert-info mt-3">
                    No se encontraron colegios para la localidad 
                    <strong th:text="${localidadSeleccionada}"></strong>.
                </div>
            </div>

        </div>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
